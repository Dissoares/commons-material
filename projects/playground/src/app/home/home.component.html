<div class="layout-sistema" [class.layout-sistema--sidebar-fechada]="!sidebarOpen">
    <header class="layout-sistema__cabecalho">
        <app-home-header [sidebarOpen]="sidebarOpen" (menuClick)="toggleSidebar()"></app-home-header>
    </header>

    <aside id="sidebar-principal" class="layout-sistema__barra-lateral" aria-label="Navegacao principal">
        <app-home-sidebar></app-home-sidebar>
    </aside>

    <main class="layout-sistema__conteudo">
        <app-home-content></app-home-content>
    </main>

    <footer class="layout-sistema__rodape">
        <app-home-footer></app-home-footer>
    </footer>
</div>
